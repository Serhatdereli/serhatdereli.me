name: Deploy site to GitHub Pages

# Publishes a STATIC version of the site to GitHub Pages:
#  - the portfolio homepage at /
#  - the private Life Hub app at /goal/  (protected by its in-page passcode;
#    GitHub Pages can't run PHP, so the server-side /goal login does not apply here)
#  - the personal plan, PWA manifest/icon/service worker, and assets
# NOTE: requires the repository to be PUBLIC (or a paid plan) for Pages to build,
# and the custom domain (serhatdereli.me) to be pointed at GitHub Pages via DNS.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage static site
        run: |
          mkdir -p _site/goal _site/home
          # The Life Hub is the landing page (bare URL opens straight to it)
          cp public/life-hub.html          _site/index.html
          cp public/life-hub.html          _site/life-hub.html
          cp public/serhat-plan.html       _site/serhat-plan.html
          cp public/icon.svg public/manifest.webmanifest public/sw.js public/favicon.ico _site/
          cp -r public/assets              _site/assets
          # Portfolio homepage preserved at /home/
          cp pages/index.html              _site/home/index.html
          # /goal/ still works (old bookmarks) → redirects to the Hub at the root
          printf '%s' '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=../"><link rel="canonical" href="../"><title>Life Hub</title></head><body><a href="../">Open the Life Hub &rarr;</a></body></html>' > _site/goal/index.html
          # No CNAME: served at the GitHub Pages project URL. (Add a CNAME + DNS for a custom domain.)
          # (Not published: index.php, the PHP framework, public/tests/ phpinfo, the friend's career-plan.html.)

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
